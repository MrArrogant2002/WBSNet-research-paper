base_config: configs/default.yaml

experiment:
  name: isic2018_wbsnet
  tags: ["kaggle", "isic2018", "wbsnet", "full-model"]

dataset:
  name: ISIC2018
  # Override this if your Kaggle input mount uses a different dataset name.
  root: /kaggle/input/WBSNet_processed_data/WBSNet_Dataset/isic2018
  split_strategy: pre_split_dirs
  num_workers: 2
  prefetch_factor: 2
  pin_memory: true
  persistent_workers: true

train:
  epochs: 100
  batch_size: 8
  save_every: 0
  save_last_checkpoint: false
  save_best_full_state: false

evaluation:
  compute_hd95: false
  max_visualizations: 0
